#
# This workflow calls the main distribution pipeline from DuckDB to build, test and (optionally) release the extension
#
name: Main Extension Distribution Pipeline
on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' && github.sha || '' }}
  cancel-in-progress: true

jobs:
  duckdb-next-build:
    name: Build extension binaries
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@main
    with:
      duckdb_version: main
      ci_tools_version: main
      extension_name: webbed
      vcpkg_commit: '68a1c387f660632f2f65cdb7e8cd093a08840e5d'
      # Same cp1252 reporter crash as the v1.5.3 stable job (see below) —
      # duckdb's scripts/ci/run_tests.py emits U+274C ❌ on test-batch
      # failure and Windows' default cp1252 stdout can't encode it,
      # masking the actual test result. Excluded here too until upstream
      # sets PYTHONIOENCODING / utf8_mode on the mingw runner.
      exclude_archs: 'windows_amd64;windows_amd64_mingw'

  duckdb-stable-build:
    name: Build extension binaries
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5.3
    with:
      duckdb_version: v1.5.3
      ci_tools_version: v1.5.3
      extension_name: webbed
      vcpkg_commit: '68a1c387f660632f2f65cdb7e8cd093a08840e5d'
      # windows_amd64_mingw excluded on v1.5.3 stable: duckdb's
      # scripts/ci/run_tests.py prints a U+274C ❌ glyph on test-batch failure,
      # which Windows' default cp1252 stdout can't encode (UnicodeEncodeError),
      # masking the underlying test result. Affects every extension migrating
      # to v1.5.3 on this runner (see duckdb_urlpattern's exclude list);
      # revisit once upstream sets PYTHONIOENCODING / utf8_mode in the runner.
      exclude_archs: 'windows_amd64;windows_amd64_mingw'

  # Guards against the LINKED_LIBS class of WASM bug (issue #96): the reusable
  # distribution workflow builds and uploads the .wasm but never inspects or
  # loads it, so a side module with unresolved libxml2/zlib symbols ships green.
  # This downloads the built v1.5.3 wasm artifacts and statically checks that no
  # libxml2/zlib symbol is imported-but-undefined (no duckdb-wasm runtime needed).
  # See test/wasm/ for the full explanation.
  wasm-symbol-check:
    name: WASM symbol resolution check
    needs: [duckdb-stable-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: webbed-v1.5.3-extension-wasm_*
          path: wasm-artifacts
      - name: Check for unresolved libxml2/zlib symbols
        run: bash test/wasm/run_wasm_checks.sh wasm-artifacts

